<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Telegram Channel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1f1f1f,#2d2d2d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#111;
padding:40px;
border-radius:12px;
max-width:420px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
font-size:26px;
margin-bottom:10px;
color:#00bfff;
}

p{
opacity:0.9;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 35px;
background:#0088cc;
color:white;
font-size:18px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#00aaff;
}

img{
width:100%;
margin-top:20px;
border-radius:10px;
}

.note{
font-size:12px;
margin-top:15px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>Join Our Telegram Community</h1>

<p>Get updates, discussions and useful information from our Telegram channel.</p>

<a class="btn" href="https://t.me/yourchannel">Join Telegram</a>

<img src="preview.jpg">

<div class="note">
This page is not affiliated with Telegram. Please review channel information before joining.
</div>

</div>

</body>
</html>
